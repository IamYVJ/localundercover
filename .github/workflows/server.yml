# ============================================================================
# .github/workflows/server.yml — build the Undercover game server as a
# linux/arm64 image and push it to GHCR (public), so the Raspberry Pi pulls it
# with no login. The GitHub Pages CLIENT is deployed separately; this workflow
# only cares about the server and the shared engine it bundles.
#
# Triggers on pushes to main that touch the server, the shared pure engine, the
# manifest, the Dockerfile, or this workflow itself — plus a manual button.
# ============================================================================
name: server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'js/state.js'
      - 'js/rules.js'
      - 'js/words.js'
      - 'js/util.js'
      - 'package.json'
      - '.github/workflows/server.yml'
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/iamyvj/undercover-server

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
