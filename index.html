<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0B10" />
  <meta name="description" content="Undercover — a peer-to-peer social word-deduction game you host from your own browser. One phone each, no servers, no accounts." />
  <title>Undercover — local</title>

  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />

  <!-- Installable PWA: home-screen install + fast/offline reloads (see sw.js). -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Undercover" />

  <!-- Fonts: Playfair (display), Inter (body), JetBrains Mono (labels/codes). -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./css/styles.css" />

  <!-- PeerJS via CDN, pinned. Provides window.Peer (WebRTC signaling + P2P).
       The initial signaling handshake needs network reachability; after that,
       game traffic is direct peer-to-peer on the LAN. See js/net.js. -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
  <div id="app" class="app-root"></div>
  <noscript>This game requires JavaScript to run.</noscript>
  <script type="module" src="./js/main.js"></script>
  <script>
    // Register the service worker (secure contexts only — https or localhost).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => { /* offline install is best-effort */ });
      });
    }
  </script>
</body>
</html>
